<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Minha Trajetória | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/cadastrocss.css" />
  <link rel="icon" href="imagens/fav-icon jogo.jpg" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>

  <!-- ======= CABEÇALHO DO SITE (topo da página) ======= -->
  <div class="cabecalho-site">
    <div class="centralizador-conteudo">
      <h1 class="titulo-principal">Minha Trajetória</h1>
      <ul class="menu-navegacao">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li></li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </div>
  <!-- ======= FIM DO CABEÇALHO ======= -->


  <!-- ======= ÁREA PRINCIPAL DE CADASTRO ======= -->
  <div class="area-cadastro">

    <!-- Espaço reservado para exibir mensagens de erro -->
    <div class="espaco-alerta-erro">
      <div class="caixa-mensagem-erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="centralizador-conteudo">

      <!-- Card com o formulário de cadastro -->
      <div class="card-formulario card-formulario-cadastro">
        <h2>Bem-vindo!</h2>

        <!-- Formulário com os campos de entrada -->
        <div class="formulario-campos">

          <div class="campo-formulario">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>

          <div class="campo-formulario">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>

          <div class="campo-formulario">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>

          <div class="campo-formulario">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>

          <!-- Botão que chama a função de cadastro no JavaScript -->
          <button class="botao-enviar" onclick="cadastrar()">Cadastrar</button>

        </div><!-- fim formulario-campos -->

        <!-- Animação de carregando (aparece enquanto processa o cadastro) -->
        <div id="div_aguardar" class="area-carregando">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>

      </div><!-- fim card-formulario -->

    </div><!-- fim centralizador-conteudo -->

  </div><!-- fim area-cadastro -->


  <!-- ======= RODAPÉ DO SITE ======= -->
  <div class="rodape-site">
    <div class="centralizador-conteudo">
      <h4>O mundo dos jogos é uma maravilha!!! 2026</h4>
      <span class="versao-site">v1.0.0</span>
    </div>
  </div>
  <!-- ======= FIM DO RODAPÉ ======= -->

</body>
</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação
  let listaUsuariosCadastrados = [];

  function cadastrar() {
    // aguardar();

    // Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // -------------------------------------------------------
    // Vetor com todos os campos obrigatórios do formulário.
    // Para adicionar um novo campo, basta incluir um objeto
    // { id: "id_do_input", label: "Nome exibido na mensagem" }
    // -------------------------------------------------------
    const camposObrigatorios = [
      { id: "nome_input",              label: "Nome"                 },
      { id: "email_input",             label: "E-mail"               },
      { id: "senha_input",             label: "Senha"                },
      { id: "confirmacao_senha_input", label: "Confirmação de Senha" },
    ];

    // Filtra apenas os campos que estão vazios
    const camposVazios = camposObrigatorios.filter(
      (campo) => document.getElementById(campo.id).value.trim() === ""
    );

    // Verificando se há algum campo em branco
    if (camposVazios.length > 0) {
      const nomesCampos = camposVazios.map((c) => c.label).join(", ");
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Os seguintes campos são obrigatórios: <strong>" + nomesCampos + "</strong>";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada


    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,

      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
