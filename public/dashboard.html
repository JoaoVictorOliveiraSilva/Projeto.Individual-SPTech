<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - PS2 vs PS3</title>
    <link rel="stylesheet" href="css/dashoboard1.css">
    <link rel="icon" href="imagens/fav-icon jogo.jpg" />
</head>

<body>
    
    <div class="dash-wrap">
        <div class="dash-header">
            <div class="dash-title-header">QUAL CONSOLE É O SEU?</div>
            <div class="dash-sub">PS2 vs PS3 · seu resultado</div>
            <a href="index.html">Home</a>
        </div>

        <div class="dash-body">

            <div class="dash-section-title">SEUS RESULTADOS</div>

            <div class="dash-grid">
                <div class="dash-card">
                    <span class="dash-card-label">PONTOS PS2</span>
                    <div class="dash-card-value" id="pontos_-ps2" style="color:#3b82f6">0</div>
                </div>
                <div class="dash-card">
                    <span class="dash-card-label">PONTOS PS3</span>
                    <div class="dash-card-value" id="pontos_-ps3" style="color:#4ade80">0</div>
                </div>
            </div>

            <div class="bar-section">
                <span class="bar-tag">PERFIL</span>
                <div class="bar-row">
                    <div class="bar-label">
                        <span style="color:#3b82f6">PS2</span>
                        <span id="pct-ps2-label">0%</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill-ps2" id="bar-ps2" style="width:0%"></div>
                    </div>
                </div>
                <div class="bar-row" style="margin-bottom:0">
                    <div class="bar-label">
                        <span style="color:#4ade80">PS3</span>
                        <span id="pct-ps3-label">0%</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill-ps3" id="bar-ps3" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div class="bar-section" style="margin-bottom:20px;">
                <span class="bar-tag">SUAS RESPOSTAS</span>
                <div id="answers-summary" style="display:flex;flex-direction:column;gap:12px;margin-top:4px;"></div>
            </div>

            <div id="recommendation-box"></div>

            <button class="btn-refazer" onclick="window.location.href='quiz.html'">↺ REFAZER QUIZ</button>

        </div>
    </div>

    <script>
        // =============================================
        // Substitua o bloco <script> do dashboard.html por esse:
        // =============================================

        var fkUsuario = sessionStorage.ID_USUARIO;
        fetch("/quiz/resultado/" + fkUsuario)

            .then(function (resposta) {

                if (resposta.ok) {
                    return resposta.json();
                } else {
                    throw "Erro ao buscar resultado";
                }
            })

            .then(function (dados) {

                var pontos_ps2 = dados.pontos_ps2;
                var pontos_ps3 = dados.pontos_ps3;

                var respostas = dados.respostas;

                preencherDashboard(pontos_ps2, pontos_ps3, respostas);
            })

            .catch(function (erro) {

                console.log(erro);
            });

        function preencherDashboard(pontos_ps2, pontos_ps3, respostas) {

            var total = pontos_ps2 + pontos_ps3;

            var pctps2 = total > 0
                ? Math.round((pontos_ps2 / total) * 100)
                : 50;

            var pctps3 = total > 0
                ? Math.round((pontos_ps3 / total) * 100)
                : 50;

            document.getElementById('pontos_-ps2').textContent = pontos_ps2;

            document.getElementById('pontos_-ps3').textContent = pontos_ps3;

            document.getElementById('pct-ps2-label').textContent =
                pctps2 + '%';

            document.getElementById('pct-ps3-label').textContent =
                pctps3 + '%';

            setTimeout(function () {

                document.getElementById('bar-ps2').style.width =
                    pctps2 + '%';

                document.getElementById('bar-ps3').style.width =
                    pctps3 + '%';

            }, 100);

            var summary = document.getElementById('answers-summary');

            summary.innerHTML = '';

            respostas.forEach(function (r, i) {

                var div = document.createElement('div');

                div.style.cssText =
                    'border-bottom:1px solid #1a1a4a;padding-bottom:10px;';

                div.innerHTML =
                    '<div class="answer-item-q">Q' + (i + 1) + ': ' + r.pergunta + '</div>' +
                    '<div class="answer-item-r">▸ ' + r.resposta + '</div>';

                summary.appendChild(div);
            });

            var recomendado =
                pontos_ps2 >= pontos_ps3 ? 'ps2' : 'ps3';

            var rec = document.getElementById('recommendation-box');

            if (recomendado === 'ps2') {

                rec.innerHTML =
                    '<div class="recommendation-box rec-ps2">' +
                    '<span class="rec-tag">RECOMENDAÇÃO</span>' +
                    '<div class="rec-console-name">PLAYSTATION 2</div>' +
                    '<div class="rec-desc">Você tem o espírito clássico dos games! Valoriza boas histórias, jogabilidade marcante e aquela nostalgia que nenhum gráfico moderno substitui. O PS2 é o console com o maior catálogo da história — e ele foi feito pra você.</div>' +
                    '<span class="rec-badge">► SEU CONSOLE É O PS2 ◄</span>' +
                    '</div>';

            } else {

                rec.innerHTML =
                    '<div class="recommendation-box rec-ps3">' +
                    '<span class="rec-tag">RECOMENDAÇÃO</span>' +
                    '<div class="rec-console-name">PLAYSTATION 3</div>' +
                    '<div class="rec-desc">Você é do time da evolução! Curte gráficos de qualidade, jogo online, troféus e sentir que a tecnologia avançou junto com você. O PS3 trouxe uma nova era aos games — e o seu perfil combina com cada avanço que ele trouxe.</div>' +
                    '<span class="rec-badge">► SEU CONSOLE É O PS3 ◄</span>' +
                    '</div>';
            }
        }
    </script>

</body>

</html>
