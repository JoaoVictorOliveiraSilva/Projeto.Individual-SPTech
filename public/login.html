<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Minha Trajetória | Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login2.css">
  <link rel="icon" href="imagens/fav-icon jogo.jpg" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

  <!-- CABEÇALHO DO SITE (topo da página)  -->
  <div class="cabecalho-site">
    <div class="centralizador-conteudo">
      <h1 class="titulo-principal">Minha Trajetória</h1>
      <ul class="menu-navegacao">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li></li>
        <li>|</li>
        <li>
          <a href="cadastro.html">Cadastre-se</a>
        </li>
      </ul>
    </div>
  </div>
  <!-- FIM DO CABEÇALHO  -->


  <!--  ÁREA DE LOGIN (centro da página) -->
  <div class="area-login">

    <!-- Espaço reservado para exibir mensagens de erro -->
    <div class="espaco-alerta-erro">
      <div class="caixa-mensagem-erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="centralizador-conteudo">

      <!-- Card com o formulário de login -->
      <div class="card-login">
        <h2>Olá de volta!</h2>

        <!-- Formulário com os campos de entrada -->
        <div class="formulario-campos">

          <div class="campo-formulario">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="Login">
          </div>

          <div class="campo-formulario">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******">
          </div>

          <!-- Botão que chama a função de login no JavaScript -->
          <button class="botao-entrar" onclick="entrar()">Entrar</button>

        </div><!-- fim formulario-campos -->

        <!-- Animação de carregando (aparece enquanto processa o login) -->
        <div id="div_aguardar" class="area-carregando">
          <img src="./assets/circle-loading.gif" id="loading-gif">
        </div>

        <div id="div_erros_login"></div>

      </div><!-- fim card-login -->

    </div><!-- fim centralizador-conteudo -->

  </div><!-- fim area-login -->


  <!--  RODAPÉ DO SITE  -->
  <div class="rodape-site">
    <div class="centralizador-conteudo">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2023</h4>
      <span class="versao-site">v1.0.0</span>
    </div>
  </div>
  <!--  FIM DO RODAPÉ  -->

</body>
</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "quiz.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;

        
    }


    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
